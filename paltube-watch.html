<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>paltube — watch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --orange: #e85d00;
  --orange-hover: #d05000;
  --orange-light: #2a1500;
  --bg: #0a0a0a;
  --surface: #141414;
  --surface2: #1e1e1e;
  --surface3: #282828;
  --border: rgba(255,255,255,0.07);
  --border-med: rgba(255,255,255,0.13);
  --text: #f0f0f0;
  --text2: #aaa;
  --text3: #666;
  --radius: 10px;
  --radius-sm: 6px;
  --radius-lg: 14px;
}

body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.5; min-height: 100vh; }
a { color: var(--text); text-decoration: none; cursor: pointer; }
button { font-family: 'DM Sans', sans-serif; cursor: pointer; }
::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

/* ── HEADER ── */
#header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,10,10,0.92); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 16px;
  padding: 0 20px; height: 54px;
}
#logo { font-size: 17px; font-weight: 700; color: var(--orange); display: flex; align-items: center; gap: 6px; white-space: nowrap; }
#logo svg { width: 26px; height: 18px; }
#logo a { color: var(--orange); }
#header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.hbtn { font-size: 13px; padding: 6px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border-med); background: transparent; color: var(--text2); }
.hbtn:hover { background: var(--surface2); color: var(--text); }
.hbtn-orange { background: var(--orange); color: #fff; border-color: var(--orange); }
.hbtn-orange:hover { background: var(--orange-hover); }
.avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--orange); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; color: #fff; cursor: pointer; flex-shrink: 0; }

/* ── LAYOUT ── */
#page { max-width: 1240px; margin: 0 auto; padding: 20px 16px; display: grid; grid-template-columns: 1fr 360px; gap: 24px; align-items: start; }

/* ── PLAYER ── */
#player-wrap { background: #000; border-radius: var(--radius-lg); overflow: hidden; aspect-ratio: 16/9; width: 100%; position: relative; }
#player-wrap video { width: 100%; height: 100%; display: block; }
#player-wrap.loading::after { content: ''; position: absolute; inset: 0; background: var(--surface2); }

/* ── VIDEO INFO ── */
#video-info { margin-top: 14px; }
#video-title { font-size: 20px; font-weight: 700; line-height: 1.3; margin-bottom: 12px; }

#video-actions-row { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
#video-stats { font-size: 13px; color: var(--text3); display: flex; gap: 14px; align-items: center; }
.action-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 16px; border-radius: 20px;
  border: 1px solid var(--border-med); background: var(--surface2);
  color: var(--text); font-size: 13px; font-weight: 500;
  transition: background .12s;
}
.action-btn:hover { background: var(--surface3); }
.action-btn.active { background: var(--orange); border-color: var(--orange); color: #fff; }
.action-btn svg { width: 15px; height: 15px; }
.actions-group { display: flex; gap: 8px; flex-wrap: wrap; }

/* ── CHANNEL INFO ── */
#channel-row {
  display: flex; align-items: center; gap: 14px;
  background: var(--surface); border-radius: var(--radius);
  padding: 14px 16px; margin-bottom: 16px;
  border: 1px solid var(--border);
}
#channel-avatar { width: 46px; height: 46px; border-radius: 50%; background: var(--orange); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: #fff; flex-shrink: 0; cursor: pointer; }
#channel-details { flex: 1; min-width: 0; }
#channel-name { font-size: 15px; font-weight: 600; cursor: pointer; }
#channel-name:hover { color: var(--orange); }
#channel-meta { font-size: 12px; color: var(--text3); margin-top: 2px; }
#follow-btn {
  padding: 8px 20px; border-radius: 20px; border: none;
  background: var(--orange); color: #fff; font-size: 13px; font-weight: 600;
  flex-shrink: 0; transition: background .12s;
}
#follow-btn:hover { background: var(--orange-hover); }
#follow-btn.following { background: var(--surface3); color: var(--text2); border: 1px solid var(--border-med); }

/* ── DESCRIPTION ── */
#desc-box {
  background: var(--surface2); border-radius: var(--radius);
  padding: 14px 16px; font-size: 13px; color: var(--text2);
  line-height: 1.7; margin-bottom: 20px; cursor: pointer;
}
#desc-box.collapsed #desc-full { display: none; }
#desc-box .desc-toggle { font-size: 12px; color: var(--orange); margin-top: 6px; display: block; }
#desc-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.tag-pill { font-size: 12px; padding: 3px 11px; border-radius: 12px; background: var(--surface3); color: var(--text2); cursor: pointer; }
.tag-pill:hover { color: var(--orange); }

/* ── COMMENTS ── */
#comments-wrap h3 { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
.comment-form { display: flex; gap: 10px; margin-bottom: 20px; align-items: flex-start; }
.comment-form .avatar { flex-shrink: 0; margin-top: 4px; }
.comment-form-right { flex: 1; display: flex; flex-direction: column; gap: 8px; }
.comment-form textarea {
  width: 100%; background: var(--surface2); border: 1px solid var(--border-med);
  border-radius: var(--radius-sm); padding: 9px 12px;
  font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text);
  resize: none; height: 52px; outline: none; transition: border-color .15s;
}
.comment-form textarea:focus { border-color: var(--orange); height: 80px; }
.comment-form-actions { display: flex; justify-content: flex-end; gap: 8px; }
.btn-post { padding: 7px 18px; border-radius: 20px; border: none; background: var(--orange); color: #fff; font-size: 13px; font-weight: 600; }
.btn-post:hover { background: var(--orange-hover); }
.btn-cancel { padding: 7px 14px; border-radius: 20px; border: 1px solid var(--border-med); background: transparent; color: var(--text2); font-size: 13px; }

.comment { display: flex; gap: 10px; margin-bottom: 18px; animation: fadeIn .2s; }
@keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
.comment-avatar-sm { width: 32px; height: 32px; border-radius: 50%; background: var(--surface3); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--text2); flex-shrink: 0; }
.comment-body { flex: 1; }
.comment-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 3px; }
.comment-name { font-size: 13px; font-weight: 600; }
.comment-time { font-size: 11px; color: var(--text3); }
.comment-text { font-size: 13px; color: var(--text2); line-height: 1.55; }
.comment-likes { font-size: 12px; color: var(--text3); margin-top: 6px; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; }
.comment-likes:hover { color: var(--orange); }
.no-comments { text-align: center; padding: 32px 0; color: var(--text3); font-size: 13px; }

/* ── SIDEBAR ── */
#sidebar h3 { font-size: 14px; font-weight: 600; color: var(--text2); margin-bottom: 12px; }
.related-card { display: flex; gap: 10px; margin-bottom: 12px; cursor: pointer; border-radius: var(--radius-sm); padding: 6px; transition: background .1s; }
.related-card:hover { background: var(--surface2); }
.related-thumb { width: 130px; aspect-ratio: 16/9; border-radius: var(--radius-sm); background: var(--surface2); overflow: hidden; flex-shrink: 0; position: relative; }
.related-thumb video, .related-thumb img { width: 100%; height: 100%; object-fit: cover; }
.related-thumb .rduration { position: absolute; bottom: 4px; right: 4px; background: rgba(0,0,0,0.8); color: #fff; font-size: 10px; font-family: 'DM Mono', monospace; padding: 1px 4px; border-radius: 3px; }
.related-info { flex: 1; min-width: 0; }
.related-title { font-size: 12px; font-weight: 500; line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 4px; }
.related-channel { font-size: 11px; color: var(--text3); }
.related-stats { font-size: 11px; color: var(--text3); margin-top: 2px; }
.related-card:hover .related-title { color: var(--orange); }

/* ── CAT BADGE ── */
.cat-badge { display: inline-block; font-size: 11px; padding: 2px 9px; border-radius: 10px; background: var(--surface3); color: var(--text2); }

/* ── LOADING SKELETON ── */
.skel { background: linear-gradient(90deg,var(--surface2) 25%,var(--surface3) 50%,var(--surface2) 75%); background-size:200% 100%; animation: shimmer 1.4s infinite; border-radius: var(--radius-sm); }
@keyframes shimmer { 0%{background-position:200% 0}100%{background-position:-200% 0} }

/* ── SHARE MODAL ── */
#share-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; align-items: center; justify-content: center; }
#share-modal.open { display: flex; }
#share-box { background: var(--surface); border: 1px solid var(--border-med); border-radius: var(--radius-lg); padding: 24px 26px; width: 420px; max-width: 95vw; }
#share-box h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
#share-url { width: 100%; background: var(--surface2); border: 1px solid var(--border-med); border-radius: var(--radius-sm); padding: 9px 12px; font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text2); outline: none; }
.share-copy-btn { margin-top: 10px; width: 100%; padding: 9px; border-radius: var(--radius-sm); border: none; background: var(--orange); color: #fff; font-size: 13px; font-weight: 600; }
.share-copy-btn:hover { background: var(--orange-hover); }
.share-close { margin-top: 8px; width: 100%; padding: 8px; border-radius: var(--radius-sm); border: 1px solid var(--border-med); background: transparent; color: var(--text2); font-size: 13px; }

/* ── REPORT MODAL ── */
#report-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; align-items: center; justify-content: center; }
#report-modal.open { display: flex; }
#report-box { background: var(--surface); border: 1px solid var(--border-med); border-radius: var(--radius-lg); padding: 24px 26px; width: 380px; max-width: 95vw; }
#report-box h3 { font-size: 16px; font-weight: 700; margin-bottom: 14px; }
#report-reason { width: 100%; background: var(--surface2); border: 1px solid var(--border-med); border-radius: var(--radius-sm); padding: 9px 12px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text); resize: none; height: 90px; outline: none; }
#report-reason:focus { border-color: var(--orange); }
#report-err { font-size: 12px; color: #ff9955; margin-top: 6px; min-height: 18px; }

/* ── AUTH MODAL ── */
#auth-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; align-items: center; justify-content: center; }
#auth-modal.open { display: flex; }
#auth-box { background: var(--surface); border: 1px solid var(--border-med); border-radius: var(--radius-lg); padding: 28px 30px; width: 360px; max-width: 95vw; }
#auth-box h2 { font-size: 18px; font-weight: 700; margin-bottom: 18px; }
.auth-tabs { display: flex; gap: 4px; margin-bottom: 18px; }
.auth-tab { font-size: 13px; padding: 5px 16px; border-radius: 20px; border: 1px solid transparent; background: transparent; color: var(--text2); }
.auth-tab.active { background: var(--orange); color: #fff; }
.field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
.field label { font-size: 12px; font-weight: 500; color: var(--text2); }
.field input { background: var(--surface2); border: 1px solid var(--border-med); border-radius: var(--radius-sm); padding: 9px 12px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text); outline: none; width: 100%; }
.field input:focus { border-color: var(--orange); }
.form-err { font-size: 12px; color: #ff9955; margin-bottom: 8px; display: none; }
.form-err.show { display: block; }
.btn-orange { background: var(--orange); color: #fff; border: none; border-radius: var(--radius-sm); padding: 9px 0; font-size: 14px; font-weight: 600; width: 100%; }
.btn-orange:hover { background: var(--orange-hover); }

/* ── TOAST ── */
#toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface3); color: var(--text); border: 1px solid var(--border-med); border-radius: 20px; padding: 10px 20px; font-size: 13px; z-index: 999; transition: transform .25s; pointer-events: none; white-space: nowrap; }
#toast.show { transform: translateX(-50%) translateY(0); }

/* ── SETTINGS ── */
#settings-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:300; align-items:center; justify-content:center; }
#settings-modal.open { display:flex; }
#settings-box { background:var(--surface); border:1px solid var(--border-med); border-radius:var(--radius-lg); padding:26px 28px; width:440px; max-width:95vw; max-height:90vh; overflow-y:auto; }
#settings-box h2 { font-size:17px; font-weight:700; margin-bottom:20px; display:flex; align-items:center; justify-content:space-between; }
.settings-section { margin-bottom:22px; }
.settings-section-label { font-size:11px; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:.7px; margin-bottom:12px; }
.pfp-upload-wrap { display:flex; align-items:center; gap:14px; }
.pfp-preview { width:64px; height:64px; border-radius:50%; background:var(--orange); display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:700; color:#fff; overflow:hidden; flex-shrink:0; }
.pfp-preview img { width:100%; height:100%; object-fit:cover; }
.pfp-upload-btn { font-size:13px; padding:7px 16px; border-radius:var(--radius-sm); border:1px solid var(--border-med); background:var(--surface2); color:var(--text); cursor:pointer; font-family:inherit; }
.pfp-upload-btn:hover { background:var(--surface3); }
.pfp-progress { font-size:12px; color:var(--orange); margin-top:6px; display:none; }
.pfp-progress.show { display:block; }
.lang-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.lang-btn { padding:8px 12px; border-radius:var(--radius-sm); border:1px solid var(--border); background:transparent; color:var(--text2); font-size:13px; cursor:pointer; text-align:left; font-family:inherit; display:flex; align-items:center; gap:8px; }
.lang-btn:hover { background:var(--surface2); color:var(--text); }
.lang-btn.active { border-color:var(--orange); background:var(--orange-light); color:var(--orange); }
.lang-btn .lang-flag { font-size:18px; }

/* ── RESPONSIVE ── */
@media (max-width: 800px) {
  #page { grid-template-columns: 1fr; }
  #sidebar { display: none; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div id="logo">
    <svg viewBox="0 0 28 20" fill="none"><rect width="28" height="20" rx="5" fill="#e85d00"/><polygon points="11,5 22,10 11,15" fill="white"/></svg>
    <a href="index.html">paltube</a>
  </div>
  <div id="header-right">
    <button class="hbtn" onclick="openSettings()" title="settings" style="padding:6px 10px;font-size:15px">⚙</button>
    <span id="userbar-guest">
      <button class="hbtn" onclick="openAuth('login')">log in</button>
      <button class="hbtn hbtn-orange" onclick="openAuth('register')">register</button>
    </span>
    <span id="userbar-loggedin" style="display:none;align-items:center;gap:10px"></span>
  </div>
</div>

<!-- PAGE -->
<div id="page">

  <!-- LEFT: player + info + comments -->
  <div>
    <!-- PLAYER -->
    <div id="player-wrap" class="loading">
      <video id="main-video" controls></video>
    </div>

    <!-- VIDEO INFO -->
    <div id="video-info">
      <div id="video-title" class="skel" style="height:28px;width:70%;margin-bottom:12px">&nbsp;</div>

      <div id="video-actions-row">
        <div id="video-stats">
          <span id="view-count">0 views</span>
          <span>•</span>
          <span id="upload-date">—</span>
          <span id="cat-badge" class="cat-badge" style="margin-left:4px">general</span>
        </div>
        <div class="actions-group">
          <button class="action-btn" id="like-btn" onclick="toggleLike()">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/></svg>
            <span id="like-count">0</span>
          </button>
          <button class="action-btn" onclick="openShare()">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg>
            Share
          </button>
          <button class="action-btn" onclick="openReport()">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M14.4 6L14 4H5v17h2v-7h5.6l.4 2h7V6z"/></svg>
            Report
          </button>
        </div>
      </div>

      <!-- CHANNEL -->
      <div id="channel-row">
        <div id="channel-avatar" onclick="goToChannel()">?</div>
        <div id="channel-details">
          <div id="channel-name" onclick="goToChannel()">loading...</div>
          <div id="channel-meta">0 videos</div>
        </div>
        <button id="follow-btn" onclick="toggleFollow()">Follow</button>
      </div>

      <!-- DESCRIPTION -->
      <div id="desc-box" class="collapsed" onclick="toggleDesc()">
        <div id="desc-preview" style="color:var(--text2)">loading...</div>
        <div id="desc-full" style="margin-top:8px;color:var(--text2)"></div>
        <span class="desc-toggle" id="desc-toggle-text">show more</span>
        <div id="desc-tags"></div>
      </div>

      <!-- COMMENTS -->
      <div id="comments-wrap">
        <h3 id="comments-heading">Comments</h3>
        <div class="comment-form">
          <div class="avatar" id="comment-avatar" style="background:var(--surface3);color:var(--text3)">?</div>
          <div class="comment-form-right">
            <textarea id="comment-input" placeholder="add a comment..." onfocus="showCommentActions()" onblur="scheduleHideActions()"></textarea>
            <div class="comment-form-actions" id="comment-actions" style="display:none">
              <button class="btn-cancel" onmousedown="hideCommentActions()">cancel</button>
              <button class="btn-post" onmousedown="postComment()">post</button>
            </div>
          </div>
        </div>
        <div id="comments-list"><div class="no-comments">loading comments...</div></div>
      </div>
    </div>
  </div>

  <!-- SIDEBAR: related -->
  <div id="sidebar">
    <h3>up next</h3>
    <div id="related-list"><div style="color:var(--text3);font-size:13px">loading...</div></div>
  </div>

</div>

<!-- SHARE MODAL -->
<div id="share-modal" onclick="if(event.target===this)closeShare()">
  <div id="share-box">
    <h3>share video</h3>
    <input type="text" id="share-url" readonly onclick="this.select()">
    <button class="share-copy-btn" onclick="copyShareUrl()">copy li
